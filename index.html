<script>
// ─── 設定 ───────────────────────────────────────────
const API_KEY  = '$2a$10$SSKtj9f4ZkKIanYszub3i.IB4goZYvFASurK8PZznci4sPRV8LGDu';

   else if(k==='disabled'){el.disabled=!!v;}else if(k==='selected'){el.selected=!!v;}else if(k==='selected'){el.selected=!!v;}else el.setAttribute(k,v);
  });

  try{await writeBin(state.binId,{candidates:newCands});}catch(e){}

};

// ─── KPI計算 ─────────────────────────────────────────
const calcKpi = cands => {
  if(!cands.length)return null;
  const total=cands.length,conf=cands.filter(c=>c.stage===7&&!c.離脱).length;
  const active=cands.filter(c=>!c.離脱&&c.stage<7).length,dropped=cands.filter(c=>c.離脱).length;
  const stageCounts=STAGES.map(s=>({...s,count:cands.filter(c=>c.stage===s.id&&!c.離脱).length}));
  const funnel=STAGES.map(s=>({...s,reached:cands.filter(c=>c.stage>=s.id).length}));
  const passRates=[];
  for(let i=0;i<funnel.length-1;i++){const f=funnel[i].reached,t=funnel[i+1].reached;passRates.push({label:STAGES[i].label+'→'+STAGES[i+1].label.replace(/[①②③④⑤⑥✅]/g,'').trim(),rate:f>0?Math.round((t/f)*100):0,color:STAGES[i+1].color});}
  const staffStats=STAFF.map(s=>{const sc=cands.filter(c=>c.担当者===s),hs=sc.filter(c=>c.手応え==='◎');return{staff:s,total:sc.length,conf:sc.filter(c=>c.stage===7&&!c.離脱).length,active:sc.filter(c=>!c.離脱&&c.stage<7).length,dropped:sc.filter(c=>c.離脱).length,lineRate:sc.length>0?Math.round((sc.filter(c=>c.stage>=2).length/sc.length)*100):0,circleRate:hs.length>0?Math.round((hs.filter(c=>c.stage===7&&!c.離脱).length/hs.length)*100):null};});
  const mm={};cands.forEach(c=>{const m=(c.eventDate||'').slice(0,7);if(!m)return;if(!mm[m])mm[m]={month:m.replace('-','/'),contact:0,confirmed:0};mm[m].contact++;if(c.stage===7&&!c.離脱)mm[m].confirmed++;});
  return{total,conf,active,dropped,stageCounts,passRates,staffStats,monthData:Object.values(mm).sort((a,b)=>a.month.localeCompare(b.month))};
};

// ─── ファイルインポート ──────────────────────────────

      });

  };

                h('tbody',null,...(state.textPrev.candidates||[]).map((c,i)=>h('tr',{style:{borderBottom:i<(state.textPrev.candidates.length-1)?'0.5px solid var(--bd)':'none'}},h('td',{style:{padding:'9px 14px',fontWeight:'700',whiteSpace:'nowrap'}},c.氏名||'—'),h('td',{style:{padding:'9px 14px',color:'var(--tx2)',maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},c.本気度||'—'),h('td',{style:{padding:'9px 14px',color:'var(--tx2)',maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},c.直近の仕事||'—'),h('td',{style:{padding:'9px 14px',color:'var(--tx2)',maxWidth:'140px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},c.今後||'—'))))
              )
            ),
            h('div',{style:{display:'flex',gap:'10px'}},
              h('button',{onclick:doTextImport,style:{padding:'12px 28px',borderRadius:'10px',border:'none',background:'var(--green)',color:'#fff',fontWeight:'700',fontSize:'14px'}},(state.textPrev.candidates?.length||0)+'名をインポートする'),
              h('button',{onclick:()=>setState({textPrev:null}),style:{padding:'12px 18px',borderRadius:'10px',border:'0.5px solid var(--bd2)',background:'transparent',color:'var(--tx2)'}},'戻る')
            )
          )
        )
    ),

    // ── 設定タブ
    state.tab==='setting'&&h('div',null,
      h('div',{class:'card',style:{marginBottom:'14px'}},
        h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'16px'}},'チーム共有設定'),
        h('div',{style:{background:'var(--bg2)',borderRadius:'10px',padding:'16px',marginBottom:'14px'}},
          h('div',{style:{fontSize:'11px',fontWeight:'700',color:'var(--tx2)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'.06em'}},'データベースID（平垣さん・松本さんに共有する）'),
          h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
            h('div',{style:{flex:1,fontSize:'13px',fontWeight:'700',background:'var(--bg1)',border:'0.5px solid var(--bd2)',borderRadius:'8px',padding:'10px 14px',wordBreak:'break-all',fontFamily:'monospace'}},state.binId||'—'),
            h('button',{onclick:()=>{navigator.clipboard?.writeText(state.binId||'');showMsg('✅ IDをコピーしました');},style:{padding:'10px 16px',borderRadius:'8px',border:'0.5px solid var(--bd2)',background:'var(--bg1)',color:'var(--tx2)',whiteSpace:'nowrap'}},'📋 コピー')
          )
        ),
        h('div',{style:{fontSize:'13px',color:'var(--tx2)',lineHeight:'1.85',background:'var(--bg2)',borderRadius:'10px',padding:'14px 16px'}},
          h('strong',{style:{color:'var(--tx1)',display:'block',marginBottom:'8px'}},'👥 平垣さん・松本さんへの共有方法'),
          h('ol',{style:{paddingLeft:'18px',display:'grid',gap:'6px'}},
            h('li',null,'上の「データベースID」の📋コピーボタンをクリック'),
            h('li',null,'このURLを平垣さん・松本さんに送る: ',h('strong',null,location.href)),
            h('li',null,'URLを開いたら「👥 チームに参加」を選択'),
            h('li',null,'担当者名を入力してデータベースIDを貼り付けて参加')
          )
        )
      ),
      h('div',{class:'card'},
        h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px'}},'アカウント'),
        h('div',{style:{fontSize:'13px',color:'var(--tx2)',marginBottom:'16px'}},'現在のログイン: ',h('strong',{style:{color:'var(--tx1)'}},state.userName)),
        h('button',{onclick:resetSetup,style:{padding:'10px 20px',borderRadius:'9px',border:'0.5px solid var(--red)',background:'transparent',color:'var(--red)',fontWeight:'600'}},'ログアウト（別の担当者に切り替え）')
      )
    )
  );
};

const render = () => {
  const app = document.getElementById('app');
  app.innerHTML='';
  if(state.phase==='loading') app.appendChild(renderLoading());
  else if(state.phase==='setup') app.appendChild(renderSetup());
  else app.appendChild(renderApp());
};

// ─── XLSXライブラリ遅延読み込み ──────────────────────
const xlsxScript=document.createElement('script');
xlsxScript.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
document.head.appendChild(xlsxScript);

// ─── 初期化 ──────────────────────────────────────────
render();
const savedBin=localStorage.getItem(BIN_KEY),savedName=localStorage.getItem(NAME_KEY);
if(savedBin&&savedName){
  state.binId=savedBin;state.userName=savedName;
  loadData(savedBin);
  startSyncTimer(savedBin);
}else{
  setState({phase:'setup'});
}
</script>
</body>
</html>
