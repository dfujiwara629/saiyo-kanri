  try{
    log.innerHTML+='既存データを確認中...<br>';
    const getRes=await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{headers:{'X-Master-Key':apiKey,'X-Bin-Versioning':'false'}});
    const getData=await getRes.json();
    const existing=getData.record?.candidates||[];
    log.innerHTML+='既存候補者: '+existing.length+'名<br>';
    const existingNames=new Set(existing.map(c=>c.氏名));
    const toAdd=DATA.filter(c=>!existingNames.has(c.氏名));
    const skipped=DATA.length-toAdd.length;
    if(skipped>0)log.innerHTML+='<span style="color:#854F0B">重複スキップ: '+skipped+'名</span><br>';
    log.innerHTML+='追加: '+toAdd.length+'名<br>';
    const newCands=[...existing,...toAdd];
    const putRes=await fetch('https://api.jsonbin.io/v3/b/'+binId,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':apiKey,'X-Bin-Versioning':'false'},body:JSON.stringify({candidates:newCands})});
    if(putRes.ok){
      log.innerHTML+='<span class="ok">✅ 完了！'+toAdd.length+'名をインポートしました。</span><br>';
      log.innerHTML+='<a href="https://dfujiwara629.github.io/saiyo-kanri/" target="_blank" style="color:#1D9E75;font-weight:700">→ アプリを開いて🔄更新ボタンを押してください</a>';
    }else{throw new Error('書き込みに失敗しました');}
  }catch(e){
    log.innerHTML+='<span class="err">エラー: '+e.message+'</span><br>';
    btn.disabled=false;
  }
}
</script>
</body>
</html>
